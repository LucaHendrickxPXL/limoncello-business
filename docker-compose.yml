services:
  postgres:
    image: postgres:17-alpine
    container_name: limoncello-business-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: limoncello_business
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - limoncello-business-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d limoncello_business"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  limoncello-business-postgres:
