services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: limoncello-business-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/limoncello_business}
      AUTH_SETUP_KEY: ${AUTH_SETUP_KEY:-replace-before-deploy}
      AUTH_PASSWORD_PEPPER: ${AUTH_PASSWORD_PEPPER:-replace-before-deploy}
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-5000}:3000"

  postgres:
    image: postgres:17-alpine
    container_name: limoncello-business-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-limoncello_business}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5434}:5432"
    volumes:
      - limoncello-business-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d limoncello_business"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  limoncello-business-postgres:
